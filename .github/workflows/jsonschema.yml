# name of the action
name: jsonschema

# trigger on release events
on:
  release:
    types: [created]

permissions:
  contents: read

# pipeline to execute
jobs:
  schema:
    runs-on: ubuntu-latest

    permissions:
      contents: write # for actions/github-script to attach files to release artifacts

    steps:
      - name: clone
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: install go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          # use version from go.mod file
          go-version-file: "go.mod"
          cache: true
          check-latest: true

      - name: build
        run: |
          make jsonschema

      - name: upload jsonschema
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          retries: 3
          script: |
            const fs = require('fs');
            const path = './schema.json';
            const name = 'schema.json';

            const fileContent = fs.readFileSync(path);

            const response = await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: context.payload.release.id,
              name: name,
              data: fileContent,
              headers: {
                'content-type': 'text/plain',
                'content-length': fileContent.length,
              },
            });

            core.info(`Uploaded asset: ${response.data.browser_download_url}`);
