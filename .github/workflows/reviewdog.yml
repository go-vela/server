# name of the action
name: reviewdog

# trigger on pull_request events
on:
  pull_request:

permissions:
  contents: read

# pipeline to execute
jobs:
  diff-review:
    runs-on: ubuntu-latest

    permissions:
      contents: read # for actions/checkout to fetch code
      pull-requests: write # for reviewdog/action-golangci-lint to report issues using PR comments

    steps:
      - name: clone
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: install go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          # use version from go.mod file
          go-version-file: "go.mod"
          cache: true
          check-latest: true

      - name: golangci-lint
        uses: reviewdog/action-golangci-lint@c76cceaaab89abe74e649d2e34c6c9adc26662d2 # v2.10.0
        with:
          github_token: ${{ secrets.github_token }}
          golangci_lint_flags: "--config=.golangci.yml --timeout=5m"
          fail_level: error
          filter_mode: diff_context
          reporter: github-pr-review

  full-review:
    runs-on: ubuntu-latest

    permissions:
      checks: write # for reviewdog/action-golangci-lint to report issues using checks
      contents: read # for actions/checkout to fetch code

    steps:
      - name: clone
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: install go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          # use version from go.mod file
          go-version-file: "go.mod"
          cache: true
          check-latest: true

      - name: golangci-lint
        uses: reviewdog/action-golangci-lint@c76cceaaab89abe74e649d2e34c6c9adc26662d2 # v2.10.0
        with:
          github_token: ${{ secrets.github_token }}
          golangci_lint_flags: "--config=.golangci.yml --timeout=5m"
          fail_level: error
          filter_mode: nofilter
