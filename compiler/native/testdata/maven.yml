metadata:
  template: true

steps:
  - name: install
    commands:
      - mvn downloadDependencies
    environment: {{ .environment }}
    image: {{ .image }}
    {{ .pull_policy }}

  - name: test
    commands:
      - mvn check
    environment: {{ .environment }}
    image: {{ .image }}
    {{ .pull_policy }}

  - name: build
    commands:
      - mvn build
    environment: {{ .environment }}
    image: {{ .image }}
    {{ .pull_policy }}

secrets:
  - name: docker_username
    key: org/repo/foo/bar
    engine: native
    type: repo

  - name: foo_password
    key: org/repo/foo/password
    engine: vault
    type: repo

  - name: vault_token

  - origin:
      name: private vault
      image: target/secret-vault:latest
      pull: always
      secrets: [ vault_token ]
      parameters:
        addr: vault.example.com
        auth_method: token
        username: octocat
        items:
          - source: secret/docker
            path: docker

  - origin:
      name: gcp secrets
      image: target/secret-gcp:latest
      pull: always
      id_request: true
      parameters:
        project_id: my-project

  {{ if .secret }}

- name: bar_password
  key: org/repo/bar/password
  engine: vault
  type: repo

  {{ end }}

services:
  - name: postgres
    image: postgres:12

  {{ if .service }}

  - name: redis
    key: redis:6

  {{ end }}
